version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      dev-tooling:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      playwright:
        patterns:
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"
    # Les mises à jour majeures ne sont jamais groupées : chacune ouvre sa
    # propre PR pour être évaluée individuellement (risque de breaking change).

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
